<!-- manager.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>__MSG_title__</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/dialog.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <h1 data-i18n="appTitle">__MSG_appTitle__</h1>
      <div class="shortcut-note" data-i18n="shortcutNote">__MSG_shortcutNote__</div>
      <div class="search-engine-bar">
        <select id="searchEngine" class="search-engine-select">
          <option value="baidu">百度</option>
          <option value="google">Google</option>
          <option value="bing">Bing</option>
        </select>
        <input id="webSearchInput" class="search-engine-input" data-i18n-placeholder="searchEnginePlaceholder" autocomplete="off" />
        <button id="webSearchButton" class="primary search-engine-button" data-i18n="searchEngineButton">__MSG_searchEngineButton__</button>
      </div>
    </header>

    <div class="content">
      <aside class="side-panel">
        <div class="side-header">
          <div>
            <h2 data-i18n="groupManagement">分组管理</h2>
            <p data-i18n="groupManagementHint">管理你的标签分组</p>
          </div>
          <button id="addGroupBtn" class="primary" data-i18n="addGroup">+ 新增分组</button>
        </div>
        <div id="groupList" class="group-list"></div>
      </aside>

      <main class="main-panel">
        <div class="main-header">
          <div>
            <h2 id="groupTitle" data-i18n="openTabs">__MSG_openTabs__</h2>
            <p id="groupHint" class="group-hint" data-i18n="groupHintOpenTabs">__MSG_groupHintOpenTabs__</p>
          </div>
          <div class="group-actions">
            <button id="addSiteBtn" class="secondary hidden" data-i18n="addSite">__MSG_addSite__</button>
            <button id="closeDuplicate" data-i18n="closeDuplicate">去重标签</button>
            <button id="refresh" data-i18n="refresh">刷新列表</button>
          </div>
        </div>

        <div class="search-box">
          <input id="search" placeholder="__MSG_searchPlaceholder__" data-i18n-placeholder="searchPlaceholder" autocomplete="off" />
        </div>

        <div class="container">
          <div id="tabList" class="tab-list"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="global-actions">
    <button id="languageToggle" class="secondary language-btn">__MSG_switchToEnglish__</button>
    <button id="importGroups" class="secondary import-btn" data-i18n="importData">__MSG_importData__</button>
    <button id="exportGroups" class="export-btn" data-i18n="exportData">__MSG_exportData__</button>
  </div>

  <input id="importFileInput" type="file" accept="application/json" hidden />
  <div id="groupMenu" class="group-menu hidden"></div>
  <div id="dialogOverlay" class="dialog-overlay hidden">
    <div class="dialog-box">
      <div class="dialog-header">
        <div id="dialogTitle" data-i18n="dialogTitle">__MSG_dialogTitle__</div>
        <button id="dialogClose" class="dialog-close">×</button>
      </div>
      <div id="dialogBody" class="dialog-body"></div>
      <div class="dialog-actions">
        <button id="dialogCancel" class="secondary" data-i18n="dialogCancel">__MSG_dialogCancel__</button>
        <button id="dialogConfirm" class="primary" data-i18n="dialogConfirm">__MSG_dialogConfirm__</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
